title: "Session 1: Your First Declarative Agent — From Scaffold to Persona"
description: Build and deploy the Zava Insurance HR Onboarding Buddy, then level it up with rich instructions and conversation starters.
version: 2
demos:
  - title: Start Presentation
    steps:
      - action: executeVSCodeCommand
        command: demo-time.togglePresentationMode
      - action: setPresentationView

  - title: "Slide: Title"
    steps:
      - action: openSlide
        path: slides/session-1.md
        slide: 1
        theme: .demo/templates/microsoft-theme.css

  - title: "Slide: Welcome to the Series"
    steps:
      - action: openSlide
        path: slides/session-1.md
        slide: 2
        theme: .demo/templates/microsoft-theme.css

