title: "Session 3: Grounding Your Agent with Knowledge — SharePoint, Teams, Web, Email & People"
description: Expand the agent's reach beyond embedded files — connect it to SharePoint document libraries, Teams conversations, scoped web search, Outlook email, and People profiles for comprehensive organizational knowledge with citations and access control.
