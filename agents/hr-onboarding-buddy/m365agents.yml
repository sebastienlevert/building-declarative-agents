# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.11/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file
# Visit https://aka.ms/teamsfx-actions for details on actions
version: v1.11

environmentFolderPath: ./env

# Triggered when 'teamsapp provision' is executed
provision:
  # Pre-provision: validate that required environment variables are set
  - uses: script
    name: validate-environment
    with:
      run: |
        echo "Validating environment variables..." &&
        node -e "
          const required = [
            'ZAVA_ONBOARDING_DOCUMENTS_URL',
            'ZAVA_NEW_HIRE_TEAMS_CHANNEL_URL',
            'ZAVA_WEBSITE_URL',
            'AGENT_DISCLAIMER'
          ];
          const missing = required.filter(v => !process.env[v]);
          if (missing.length) {
            console.error('Missing required env vars:', missing.join(', '));
            process.exit(1);
          }
          console.log('All required environment variables are set.');
        "
      shell: bash

  # Creates an app
  - uses: teamsApp/create
    with:
      # app name
      name: hr-onboarding-buddy
    # Write the information of created resources into environment file for
    # the specified environment variable(s).
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  # Build app package with latest env value
  - uses: teamsApp/zipAppPackage
    with:
      # Path to manifest template
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build
  # Update the app manifest to an existing app in Developer Portal.
  # Will use the app id in manifest file to determine which app to update.
  - uses: teamsApp/update
    with:
      # Relative path to this file. This is the path for built zip file.
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
  # Extend your app to Outlook and the Microsoft 365 app
  - uses: teamsApp/extendToM365
    with:
      # Relative path to the build app package.
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      scope: ${{AGENT_SCOPE}}
    # Write the information of created resources into environment file for
    # the specified environment variable(s).
    writeToEnvironmentFile:
      titleId: M365_TITLE_ID
      appId: M365_APP_ID
      shareLink: SHARE_LINK

  # Post-provision: log deployment details
  - uses: script
    name: post-provision-log
    with:
      run: |
        echo "✅ Provisioned hr-onboarding-buddy (${{APP_NAME_SUFFIX}}) at $(date)" &&
        echo "   Teams App ID: ${{TEAMS_APP_ID}}" &&
        echo "   M365 Title ID: ${{M365_TITLE_ID}}" &&
        echo "   Share Link: ${{SHARE_LINK}}"
      shell: bash

# Triggered when 'teamsapp publish' is executed
publish:
  # Pre-publish: validate the manifest schema
  - uses: teamsApp/validateManifest
    with:
      manifestPath: ./appPackage/manifest.json

  # Pre-publish: verify disclaimer is configured
  - uses: script
    name: pre-publish-check
    with:
      run: |
        echo "Running pre-publish checks..." &&
        node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('./appPackage/declarativeAgent.json', 'utf8'));
          if (!manifest.disclaimer || !manifest.disclaimer.text) {
            console.error('ERROR: Agent must have a disclaimer before publishing.');
            process.exit(1);
          }
          console.log('Pre-publish checks passed.');
        "
      shell: bash

  # Build app package with latest env value
  - uses: teamsApp/zipAppPackage
    with:
      # Path to manifest template
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build
  # Apply the app manifest to an existing app in
  # Developer Portal.
  # Will use the app id in manifest file to determine which app to update.
  - uses: teamsApp/update
    with:
      # Relative path to this file. This is the path for built zip file.
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
  # Publish the app to
  # Teams Admin Center (https://admin.teams.microsoft.com/policies/manage-apps)
  # for review and approval
  - uses: teamsApp/publishAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
    # Write the information of created resources into environment file for
    # the specified environment variable(s).
    writeToEnvironmentFile:
      publishedAppId: TEAMS_APP_PUBLISHED_APP_ID
projectId: 738edb5c-fe30-447a-8bcf-19cf3ddf192d
